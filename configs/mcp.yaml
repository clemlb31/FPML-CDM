# MCP server configuration
# Loaded by agent/helpers.py::get_servers() → MultiServerMCPClient
#
# Every MCP is its own Python server under mcp_servers/ (see mcp_servers/README.md):
#   filesystem       — read knowledge_base/ + data/, read-write workspaces/  (port 8080)
#   validator        — compile + run_test feedback loop (Docker Maven)        (port 8003)
#   grep             — ripgrep content search                                 (port 8005)
#   cdm_lookup       — CDM 6.19 API introspection (javap)                     (port 8006)
#   internet_search  — web search (Tavily wrapper; needs TAVILY_KEY in .env)  (port 8007)
#
# Why only one filesystem server: MultiServerMCPClient flattens tools by NAME, so a
# second filesystem instance would shadow write_file/read_file and silently break
# writes. One server covering every needed directory avoids that entirely.
#
# Transport: streamable_http (FastMCP --transport streamable-http).
# Start all local servers with: bash mcp_servers/start_all.sh
#
# ${VAR} tokens in url values are expanded from the environment (see get_servers()).

servers:

  # ── Filesystem: write workspaces/, read knowledge_base/ + data/ ──────────────
  filesystem:
    transport: streamable_http
    url: "http://localhost:8080/mcp"

  # ── Build & test feedback loop (compile_project, run_test) — Docker Maven ────
  validator:
    transport: streamable_http
    url: "http://localhost:8003/mcp"

  # ── Grep (ripgrep wrapper — content search; filesystem only matches names) ───
  grep:
    transport: streamable_http
    url: "http://localhost:8005/mcp"

  # ── CDM API introspection (cdm_lookup — real builder/enum signatures via javap) ─
  cdm_lookup:
    transport: streamable_http
    url: "http://localhost:8006/mcp"

  # ── Internet search (internet_search — our Tavily wrapper; key from .env) ────
  internet_search:
    transport: streamable_http
    url: "http://localhost:8007/mcp"
